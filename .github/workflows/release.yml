name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}.0" >> $GITHUB_OUTPUT

      - name: Publish ClickOnce
        run: dotnet publish TrayCommander.csproj -p:PublishProfile=ClickOnce -p:ApplicationVersion=${{ steps.version.outputs.version }} -v:detailed 2>&1 | Select-String -Pattern 'MSB3094|SourceFiles|DestinationFiles|error|Error' | Select-Object -First 40

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./publish
