name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}.0" >> $GITHUB_OUTPUT

      - name: Publish ClickOnce
        run: msbuild TrayCommander.csproj /restore /t:Publish /p:PublishProfile=ClickOnce /p:ApplicationVersion=${{ steps.version.outputs.version }} /p:GenerateClickOnceManifests=true /p:Configuration=Release

      - name: Copy landing page
        run: Copy-Item web\index.html bin\Release\net10.0-windows\publish\index.html

      - name: Prevent manifest line-ending corruption
        run: |
          "* binary`n" | Set-Content -Path bin\Release\net10.0-windows\publish\.gitattributes -Encoding ascii -NoNewline

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./bin/Release/net10.0-windows/publish
