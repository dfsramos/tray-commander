name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}.0" >> $GITHUB_OUTPUT

      - name: Publish ClickOnce
        run: |
          dotnet publish TrayCommander.csproj -p:PublishProfile=ClickOnce -p:ApplicationVersion=${{ steps.version.outputs.version }} -v:diag 2>&1 | Out-File build-diag.log -Encoding utf8
          if ($LASTEXITCODE -ne 0) {
            Get-Content build-diag.log | Select-String -Pattern 'MSB3094|_Deployment|GenerateClickOnce|SourceFile|DestinationFile|error MSB' | Select-Object -First 80
            exit 1
          }

      - name: Upload diagnostic log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostic
          path: build-diag.log

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./publish
